<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI공학개론 7조 // MEMBER INTRODUCTION 2026</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* 하이픈(--) 기호 수정 완료 */
            --bg: #ffffff;
            --fg: #111111;
            --accent-red: #ff1744;
            --pack-blue: #2a3eb1;
            --retro-yellow: #ffcb05;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; cursor: none !important; }
        body { background-color: var(--bg); color: var(--fg); overflow-x: hidden; transition: background-color 0.5s ease; }

        /* — Custom PokeBall Cursor — */
        #custom-cursor { position: fixed; top: 0; left: 0; width: 32px; height: 32px; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: transform 0.1s ease-out; }
        .pokeball-cursor { 
            width: 100%; height: 100%; background: linear-gradient(to bottom, #ff0000 50%, #ffffff 50%);
            border: 2px solid #000; border-radius: 50%; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .pokeball-cursor::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #000; transform: translateY(-50%); }
        .pokeball-cursor::after { content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 10px; background: #fff; border: 2px solid #000; border-radius: 50%; transform: translate(-50%, -50%); }
        body.clicking #custom-cursor { transform: translate(-50%, -50%) scale(0.8) rotate(20deg); }

        /* — Sections — */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: #fff; z-index: 10; }
        .hero h1 { font-size: clamp(3rem, 15vw, 10rem); font-weight: 950; line-height: 0.9; text-transform: uppercase; }

        /* — Unboxing Interaction — */
        .unboxing-section { height: 500vh; background: #000; position: relative; }
        .unboxing-sticky { position: sticky; top: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .pack-wrapper { position: relative; width: 320px; height: 460px; z-index: 10; display: flex; justify-content: center; align-items: center; }
        
        /* 배경색 변수 참조 수정 */
        .pack-half { position: absolute; width: 100%; background: var(--pack-blue); border: 6px solid #fff; overflow: hidden; display: flex; justify-content: center; }
        
        .pack-top { 
            top: 0; height: 85px; border-bottom: none; border-radius: 12px 12px 0 0; z-index: 12;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 95% 90%, 90% 100%, 85% 90%, 80% 100%, 75% 90%, 70% 100%, 65% 90%, 60% 100%, 55% 90%, 50% 100%, 45% 90%, 40% 100%, 35% 90%, 30% 100%, 25% 90%, 20% 100%, 15% 90%, 10% 100%, 5% 90%, 0% 100%);
            transform-origin: bottom left;
        }
        .pack-main { 
            top: 80px; height: 380px; border-top: none; border-radius: 0 0 12px 12px; z-index: 11;
            clip-path: polygon(0% 2.5%, 5% 0%, 10% 2.5%, 15% 0%, 20% 2.5%, 25% 0%, 30% 2.5%, 35% 0%, 40% 2.5%, 45% 0%, 50% 2.5%, 55% 0%, 60% 2.5%, 65% 0%, 70% 2.5%, 75% 0%, 80% 2.5%, 85% 0%, 90% 2.5%, 95% 0%, 100% 2.5%, 100% 100%, 0% 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pack-logo { font-size: 2.5rem; font-weight: 950; color: var(--retro-yellow); text-shadow: 4px 4px 0 #3b4cca; transform: rotate(-5deg); }
        .scissors { position: absolute; left: 0; top: calc(50% - 150px); width: 80px; height: 80px; z-index: 50; opacity: 0; transform: translate(-50%, -50%); }
        .card-preview-pile { position: absolute; width: 280px; height: 400px; background: #fff; border-radius: 10px; border: 4px solid #111; top: 40px; z-index: 5; opacity: 0; visibility: hidden; }

        /* — Member Cards — */
        .member-section { height: 180vh; position: relative; }
        .sticky-content { position: sticky; top: 0; height: 100vh; display: flex; justify-content: center; align-items: center; perspective: 2000px; }
        .card-container { width: 90%; max-width: 440px; aspect-ratio: 1 / 1.4; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(100px) rotateX(10deg); opacity: 0; cursor: pointer !important; }
        .card-container.active { opacity: 1; transform: translateY(0) rotateX(0deg); }
        .card-container.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 14px solid #111; border-radius: 15px; box-shadow: 20px 20px 0px rgba(0,0,0,0.1); overflow: hidden; }
        .card-back { background: var(--pack-blue); display: flex; justify-content: center; align-items: center; }
        .card-back-design { width: 150px; height: 150px; border: 8px solid #fff; border-radius: 50%; position: relative; background: linear-gradient(to bottom, #ff1744 50%, #fff 50%); }
        .card-back-design::after { content: 'TEAM'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border: 6px solid #111; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 0.8rem; }

        .card-front { background: #fff; padding: 24px; transform: rotateY(180deg); display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 4px solid #111; padding-bottom: 8px; }
        .card-name { font-size: 2rem; font-weight: 900; }
        
        .card-img-area { width: 100%; aspect-ratio: 1.5 / 1; border: 4px solid #111; margin-bottom: 20px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .member-photo { width: 100%; height: 100%; object-fit: cover; }

        .ability-label { font-weight: 900; color: #fff; display: inline-block; padding: 2px 8px; margin-bottom: 5px; border-radius: 4px; }
        .ability-desc { font-weight: 600; font-size: 0.95rem; line-height: 1.4; color: #333; }
        .hologram-effect { position: absolute; inset: 0; background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.6) 50%, transparent 80%); background-size: 200% 200%; animation: moveHolo 3s infinite linear; pointer-events: none; mix-blend-mode: overlay; }
        @keyframes moveHolo { 0% { background-position: -200% 0%; } 100% { background-position: 200% 0%; } }

        footer { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background: #000; color: #fff; text-align: center; }
        .footer-bg-image { position: absolute; inset: 0; background: url('unnamed.jpg') center/cover; filter: brightness(0.4); z-index: 1; }
        .cta-button { padding: 1.5rem 4rem; border: 4px solid #fff; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); color: #fff; font-size: 1.8rem; font-weight: 900; transition: 0.3s; z-index: 2; cursor: pointer !important; }
        .cta-button:hover { background: #fff; color: #000; transform: scale(1.05); }

        #love-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; justify-content: center; align-items: center; }
        #love-modal.active { display: flex; }
        .modal-content { background: #fff; padding: 3rem; border: 8px solid #111; box-shadow: 20px 20px 0px var(--accent-red); text-align: center; max-width: 500px; }
    </style>
</head>
<body>
    <div id="custom-cursor"><div class="pokeball-cursor"></div></div>

    <section class="hero">
        <div style="font-weight: 900; letter-spacing: 0.3em; color: var(--accent-red); margin-bottom: 1rem;">EST. 2026</div>
        <h1>AI공학개론<br>7조.</h1>
        <div style="margin-top: 2rem; font-weight: 800; letter-spacing: 0.5em; color: #666;">SCROLL TO UNBOX MEMBERS</div>
    </section>

    <section class="unboxing-section" id="unboxing-trigger">
        <div class="unboxing-sticky" id="confetti-container">
            <div class="scissors" id="scissors">
                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88" id="blade1"></line><line x1="14.47" y1="14.48" x2="20" y2="20" id="blade2"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>
            </div>
            <div class="pack-wrapper">
                <div class="card-preview-pile" id="card-pile"></div>
                <div class="pack-half pack-top" id="pack-top"></div>
                <div class="pack-half pack-main">
                    <div class="pack-logo">MEMBERS</div>
                    <div style="color: #fff; font-weight: 800; letter-spacing: 5px; margin-top: 10px;">READY FOR 2026</div>
                </div>
            </div>
        </div>
    </section>

    <div id="members-root"></div>

    <section class="group-photo-section">
        <div style="font-size: 3rem; font-weight: 950; margin-bottom: 10px; text-transform: uppercase;">TEAM 7 COLLECTIVE</div>
        <div style="font-size: 1.2rem; font-weight: 700; color: #666; letter-spacing: 0.2em; margin-bottom: 30px;">UNIQUE PERSONALITIES, ONE POWERFUL TEAM</div>
        <div class="group-photo-container"><img src="image/eks.png" alt="7조"></div>
        <div style="font-weight: 800;">AI Engineering Class of 2026 // Persona Edition</div>
    </section>

    <footer>
        <div class="footer-bg-image"></div>
        <div style="position: relative; z-index: 2;">
            <h2 style="font-size: clamp(2rem, 8vw, 6rem); font-weight: 950; margin-bottom: 2.5rem;">THANK YOU FOR WATCHING</h2>
            <button class="cta-button" onclick="toggleModal(true)">SURPRISE MESSAGE</button>
            <div style="margin-top: 4rem; font-weight: 800;">© 2026 AI공학개론 7조 ALL RIGHTS RESERVED.</div>
        </div>
    </footer>

    <div id="love-modal" onclick="toggleModal(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="font-size: 4rem; margin-bottom: 1rem;">❤️</div>
            <div style="font-size: 2.5rem; font-weight: 950; margin-bottom: 2rem;">교수님 사랑합니다!</div>
            <button style="padding: 1rem 2rem; background: #111; color: #fff; font-weight: 800; border: none; cursor: pointer !important;" onclick="toggleModal(false)">닫기</button>
        </div>
    </div>

    <script>
        const membersData = [
            { name: "이윤하", icon: "sparkles", vivid: "#a100ff", bg: "#f8e9ff", label: "완벽주의 전략가", desc: "모든 일에 계획이 있어야 직성이 풀리며, 작은 디테일 하나 놓치지 않는 예리한 눈을 가졌습니다. 차가워 보이지만 팀원들을 뒤에서 가장 많이 챙기는 '츤데레' 스타일입니다.", image: "image/이윤하.jpg" },
            { name: "김예슬", icon: "smile", vivid: "#0077ff", bg: "#e5f1ff", label: "긍정 에너지 메이커", desc: "어떤 어려운 상황에서도 웃음을 잃지 않는 무한 긍정의 소유자입니다. 특유의 밝은 기운으로 팀의 사기를 북돋우며, 갈등을 부드럽게 해결하는 '중재자' 역할을 자처합니다.", image: "image/김예슬.jpg" },
            { name: "김지은", icon: "palette", vivid: "#00e676", bg: "#e8fff3", label: "엉뚱한 아이디어 뱅크", desc: "생각의 틀을 깨는 독창적인 시각을 가진 아티스트입니다. 조용해 보이지만 가끔 던지는 한마디가 팀원들을 빵 터뜨리거나 프로젝트의 새로운 돌파구가 되기도 하는 '반전 매력'의 소유자입니다.", image: "image/김지은.jpg" },
            { name: "방상훈", icon: "shield", vivid: "#ff1744", bg: "#ffebee", label: "묵직한 해결사", desc: "말보다는 행동으로 보여주는 타입입니다. 어려운 문제가 닥쳐도 당황하지 않고 묵묵히 자리를 지키며 해결책을 찾아내는 7조의 '든든한 기둥' 같은 존재입니다.", image: "image/방상훈.jpg" },
            { name: "최형우", icon: "zap", vivid: "#3d5afe", bg: "#e8f0ff", label: "열정적인 행동파", desc: "한번 꽂히면 끝장을 봐야 하는 불꽃 같은 열정을 가지고 있습니다. 빠른 판단력과 추진력으로 팀의 진행 속도를 한 단계 끌어올리는 '엔진' 역할을 수행합니다.", image: "image/최형우.jpg" }
        ];

        const root = document.getElementById('members-root');
        membersData.forEach(m => {
            root.innerHTML += `
                <section class="member-section" data-color="${m.bg}">
                    <div class="sticky-content">
                        <div class="card-container" onclick="this.classList.toggle('is-flipped')">
                            <div class="card-face card-back"><div class="card-back-design"></div></div>
                            <div class="card-face card-front">
                                <div class="hologram-effect"></div>
                                <div class="card-header">
                                    <div class="card-name">${m.name}</div>
                                    <div class="card-icon"><i data-lucide="${m.icon}"></i></div>
                                </div>
                                <div class="card-img-area" style="background:${m.vivid};">
                                    <img src="${m.image}" alt="${m.name}의 사진" class="member-photo">
                                </div>
                                <div class="ability-box">
                                    <div class="ability-label" style="background:${m.vivid};">성격 // ${m.label}</div>
                                    <p class="ability-desc">${m.desc}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        });
        lucide.createIcons();

        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        window.addEventListener('mousedown', () => document.body.classList.add('clicking'));
        window.addEventListener('mouseup', () => document.body.classList.remove('clicking'));
        function toggleModal(show) { document.getElementById('love-modal').classList.toggle('active', show); }

        let hasPopped = false;
        window.addEventListener('scroll', () => {
            const trigger = document.getElementById('unboxing-trigger');
            const rect = trigger.getBoundingClientRect();
            const progress = Math.max(0, Math.min(1, -rect.top / (rect.height - window.innerHeight)));

            const scis = document.getElementById('scissors'), pTop = document.getElementById('pack-top'), pile = document.getElementById('card-pile');
            const blade1 = document.getElementById('blade1'), blade2 = document.getElementById('blade2');

            if (progress < 0.6) {
                const sp = progress / 0.6;
                scis.style.left = `${-150 + (window.innerWidth + 300) * sp}px`;
                scis.style.opacity = 1;
                const snap = Math.abs(Math.sin(sp * 40)) * 20;
                blade1.style.transform = `rotate(${-snap}deg)`; blade2.style.transform = `rotate(${snap}deg)`;
                pTop.style.opacity = 1; pTop.style.transform = `none`; pile.style.opacity = 0;
                hasPopped = false;
            } else {
                scis.style.opacity = 0;
                const op = (progress - 0.6) / 0.4;
                if (!hasPopped && op > 0.05) { popConfetti(); hasPopped = true; }
                pTop.style.transform = `translate(${op * 200}px, -${op * 600}px) rotate(${op * 120}deg)`;
                pTop.style.opacity = 1 - (op * 1.5);
                pile.style.visibility = "visible"; pile.style.opacity = 1;
                pile.style.transform = `translateY(${80 - op * 500}px) scale(${1 + op * 0.1})`;
            }
        });

        function popConfetti() {
            const container = document.getElementById('confetti-container');
            for (let i = 0; i < 70; i++) {
                const c = document.createElement('div');
                c.style.cssText = `position:absolute; width:10px; height:10px; background:hsl(${Math.random()*360},80%,50%); left:50%; top:50%; z-index:100; pointer-events:none;`;
                container.appendChild(c);
                const angle = Math.random() * Math.PI * 2, velocity = 12 + Math.random() * 15;
                let px = 0, py = 0, g = 0.4, vy = Math.sin(angle) * velocity, vx = Math.cos(angle) * velocity;
                const move = () => {
                    px += vx; py += vy; vy += g;
                    c.style.transform = `translate(${px}px, ${py}px) rotate(${px * 4}deg)`;
                    c.style.opacity = Math.max(0, 1 - py / 600);
                    if (parseFloat(c.style.opacity) > 0) requestAnimationFrame(move); else c.remove();
                };
                requestAnimationFrame(move);
            }
        }

        const obs = new IntersectionObserver(es => {
            es.forEach(e => {
                if (e.isIntersecting) {
                    const c = e.target.querySelector('.card-container');
                    if(c) c.classList.add('active');
                    const bc = e.target.getAttribute('data-color');
                    if (bc) document.body.style.backgroundColor = bc;
                }
            });
        }, { threshold: 0.5 });
        document.querySelectorAll('.member-section, .group-photo-section').forEach(s => obs.observe(s));
    </script>
</body>
</html>
